kind = "web"
previewPath = "/"
title = "AI IP Recommendation Copilot"
version = "1.0.0"
id = "artifacts/ai-ip-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26243

[services.development]
run = "pnpm --filter @workspace/ai-ip-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-ip-copilot", "run", "build" ]
publicDir = "artifacts/ai-ip-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26243"
BASE_PATH = "/"
