# =============================================================================
# Build the Docker image with Azure Container Registry (ACR) build tasks
# and deploy it to the Azure Web App "Smart-IP" (Linux, container mode).
#
# Required GitHub secrets:
#   AZURE_CREDENTIALS                — JSON output of `az ad sp create-for-rbac`
#   ACR_NAME                         — name of your Azure Container Registry
#                                      (just the name, not the full hostname)
#   AZURE_WEBAPP_NAME                — App Service name, e.g. "Smart-IP"
#
# Optional secrets:
#   AZURE_WEBAPP_SLOT                — deployment slot (default: production)
# =============================================================================
name: (disabled) Docker - Build & Deploy to Azure Web App

# Disabled — the project ships via the zip-deploy workflow
# (.github/workflows/main_smart-ip.yml). Re-enable only if you intentionally
# switch the Web App back to container mode.
on:
  workflow_dispatch:

env:
  IMAGE_NAME: smart-ip
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR (no local Docker needed)
        # ACR Tasks builds the image on Azure's side using the Dockerfile in
        # the repo root. This is faster and avoids shipping a multi-GB context
        # from a GitHub runner.
        run: |
          az acr build \
            --registry "${{ secrets.ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --file Dockerfile \
            .

      - name: Configure Web App to use the new image
        run: |
          ACR_LOGIN_SERVER="$(az acr show -n '${{ secrets.ACR_NAME }}' --query loginServer -o tsv)"
          az webapp config container set \
            --name '${{ secrets.AZURE_WEBAPP_NAME }}' \
            --resource-group "$(az webapp list --query "[?name=='${{ secrets.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)" \
            --container-image-name "${ACR_LOGIN_SERVER}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --container-registry-url "https://${ACR_LOGIN_SERVER}"

      - name: Restart Web App
        run: |
          az webapp restart \
            --name '${{ secrets.AZURE_WEBAPP_NAME }}' \
            --resource-group "$(az webapp list --query "[?name=='${{ secrets.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)"

      - name: Azure logout
        if: always()
        run: az logout
