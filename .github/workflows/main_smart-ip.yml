# =============================================================================
# DISABLED — superseded by .github/workflows/docker-deploy.yml
#
# This zip-based deployment was unreliable on Azure App Service because:
#   • azure/webapps-deploy@v3 silently honored .gitignore (which contains
#     `dist`), stripping the built outputs from the upload.
#   • App Service kept running stale startup commands ("pnpm install ... &&
#     bash startup.sh") that crashed because pnpm is not on its PATH.
#
# We now ship a Docker image to ACR and run the Web App in container mode.
# Re-enable this workflow only if you intentionally roll back to zip deploys.
# =============================================================================
name: (disabled) Zip deploy to Azure Web App - Smart-IP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace (typecheck + build all packages)
        run: pnpm build

      - name: Stage frontend into api-server/public
        run: |
          rm -rf artifacts/api-server/public
          mkdir -p artifacts/api-server/public
          cp -R artifacts/ai-ip-copilot/dist/public/. artifacts/api-server/public/

      - name: Zip artifact for deployment
        # Build the zip explicitly so dist/ folders ARE included even though
        # they are listed in .gitignore. node_modules is included because pnpm
        # uses symlinks and Azure cannot rebuild them. Hidden dotfiles in the
        # repo root (like .deployment) are added explicitly.
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/.turbo/*" \
            -x "**/*.log" \
            -x "**/.DS_Store" \
            -x "release.zip"
          echo "--- Sanity check: dist outputs inside the zip ---"
          unzip -l release.zip | grep -E "(artifacts/api-server/dist/index\.mjs|artifacts/ai-ip-copilot/dist/public/index\.html)" || (echo "FATAL: dist outputs are missing from the zip" && exit 1)

      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    # Belt-and-suspenders: tell Azure not to run Oryx during this deploy.
    env:
      SCM_DO_BUILD_DURING_DEPLOYMENT: false
      ENABLE_ORYX_BUILD: false

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Smart-IP"
          slot-name: "Production"
          # IMPORTANT: point at the zip file, NOT the directory. When given a
          # directory, the action re-zips it and silently honors .gitignore,
          # which excludes our dist/ folders and breaks the runtime boot.
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
