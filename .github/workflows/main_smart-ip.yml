# =============================================================================
# Build + deploy AI-IP-Recommender to Azure Web App "Smart-IP"
# This workflow uses pnpm (the repo's required package manager) and disables
# Oryx so Azure does not try to re-run `npm install` on the server.
# =============================================================================
name: Build and deploy Node.js app to Azure Web App - Smart-IP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace (typecheck + build all packages)
        run: pnpm build

      - name: Stage frontend into api-server/public
        run: |
          rm -rf artifacts/api-server/public
          mkdir -p artifacts/api-server/public
          cp -R artifacts/ai-ip-copilot/dist/public/. artifacts/api-server/public/

      - name: Zip artifact for deployment
        # Excludes that keep the upload small. node_modules is included because
        # pnpm uses symlinks and Azure cannot rebuild them.
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/.turbo/*" \
            -x "**/*.log" \
            -x "**/.DS_Store"

      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    # Belt-and-suspenders: tell Azure not to run Oryx during this deploy.
    env:
      SCM_DO_BUILD_DURING_DEPLOYMENT: false
      ENABLE_ORYX_BUILD: false

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Smart-IP"
          slot-name: "Production"
          package: .
          # TODO: replace the secret name below with the actual one from
          # GitHub → Settings → Secrets and variables → Actions.
          # It typically looks like AZUREAPPSERVICE_PUBLISHPROFILE_XXXXXXXX
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
